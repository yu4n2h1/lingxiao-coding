name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建的 tag（如 v1.0.2）'
        required: true
        type: string

# 同 tag 不取消正在运行的构建，避免 build 被 cancel 后 create-release 竞态
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── 检查是否已有 Release（防重复） ──────────────────────────────
  check-release:
    name: Check Existing Release
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.event.inputs.tag }}' || context.ref.replace('refs/tags/', '');
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag,
              });
              // Release 已存在 — 检查是否已有附件
              const assets = release.assets || [];
              if (assets.length > 0) {
                core.info(`Release ${tag} already exists with ${assets.length} assets — skipping`);
                core.setOutput('should_run', 'false');
              } else {
                core.info(`Release ${tag} exists but has no assets — will rebuild`);
                core.setOutput('should_run', 'true');
              }
            } catch (e) {
              if (e.status === 404) {
                core.info(`Release ${tag} does not exist — will create`);
                core.setOutput('should_run', 'true');
              } else {
                throw e;
              }
            }

  # ── 构建便携包（三平台并行） ──────────────────────────────────────
  build-portable:
    needs: check-release
    if: needs.check-release.outputs.should_run == 'true'
    name: Portable ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install web dependencies
        run: |
          cd web
          npm install
        shell: bash

      - name: Build
        run: npm run build:package
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: '1'

      - name: Package portable
        run: node scripts/package-portable.mjs
        shell: bash
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.target }}
          path: release/lingxiao-v*-${{ matrix.target }}.*

  # ── 构建 SEA 二进制（三平台） ─────────────────────────────────────
  build-binary:
    needs: check-release
    if: needs.check-release.outputs.should_run == 'true'
    name: Binary ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-latest
          - target: win-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install web dependencies
        run: |
          cd web
          npm install
        shell: bash

      - name: Build
        run: npm run build:package
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: '1'

      - name: Build SEA binary
        run: node scripts/build-binary.mjs
        shell: bash
        continue-on-error: true

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: release/lingxiao-v*-${{ matrix.target }}*

  # ── 构建 Windows 桌面版（MSI） ─────────────────────────────
  build-windows-desktop:
    needs: check-release
    if: needs.check-release.outputs.should_run == 'true'
    name: Windows Desktop (MSI)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MSI (artifact only)
        run: npm run desktop:msi
        env:
          LINGXIAO_SKIP_MODELS_SNAPSHOT: '1'

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingXiao-Windows-MSI
          path: release/desktop/*.msi
          if-no-files-found: error

  # ── 构建源码包 ─────────────────────────────────────────────────────

  build-source:
    needs: check-release
    if: needs.check-release.outputs.should_run == 'true'
    name: Source Tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create source release
        run: node scripts/package-release-source.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: release/lingxiao_cli-*-full.tar.gz

  # ── 创建 GitHub Release ──────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [check-release, build-portable, build-binary, build-windows-desktop, build-source]
    runs-on: ubuntu-latest
    if: always() && needs.check-release.outputs.should_run == 'true'  # 即使部分 binary 构建失败也发布
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find release-assets -type f | sort
          echo "=== Moving to flat structure ==="
          mkdir -p release-flat
          find release-assets -type f -exec cp {} release-flat/ \;
          ls -lh release-flat/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION=${TAG#v}
          cat > release-notes.md << EOF
          ## 🗡️ Lingxiao v${VERSION}

          ### 下载

          | 平台 | 便携包 | 说明 |
          |------|--------|------|
          | Linux x64 | \`lingxiao-v${VERSION}-linux-x64.tar.gz\` | 解压后运行 \`./lingxiao\` |
          | Linux arm64 | \`lingxiao-v${VERSION}-linux-arm64.tar.gz\` | 解压后运行 \`./lingxiao\` |
          | macOS Apple Silicon | \`lingxiao-v${VERSION}-darwin-arm64.tar.gz\` | 解压后运行 \`./lingxiao\` |
          | Windows x64 (桌面版) | \`LingXiao-Setup-*.msi\` | MSI 安装包 |

          ### 安装方式

          **便携包（推荐）**
          \`\`\`bash
          # Linux / macOS
          
          tar xzf lingxiao-v${VERSION}-linux-x64.tar.gz
          cd lingxiao
          \`\`\`

          **源码编译**
          \`\`\`bash
          tar xzf lingxiao_cli-${VERSION}-full.tar.gz
          cd package
          npm install
          npm run build
          npm link
          lingxiao
          \`\`\`

          **npm 全局安装**
          \`\`\`bash
          npm install -g lingxiao_cli
          lingxiao
          \`\`\`
          EOF

      - name: Delete existing release (if incomplete)
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ github.event.inputs.tag }}' || context.ref.replace('refs/tags/', '');
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag,
              });
              core.info(`Found existing release ${tag} (id=${release.id}), deleting to recreate cleanly`);
              await github.rest.repos.deleteRelease({
                ...context.repo,
                release_id: release.id,
              });
              core.info('Old release deleted');
            } catch (e) {
              if (e.status === 404) {
                core.info(`No existing release for ${tag} — will create new`);
              } else {
                throw e;
              }
            }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-flat/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref, '-') }}
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
